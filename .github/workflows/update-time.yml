name: Update Last Updated Time

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */1 * * *"

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get current time
        id: current-time
        uses: 1466587594/get-current-time@v2
        with:
          format: "dddd, MMMM D, YYYY, h:mm:ss A Z"
          utcOffset: "+05:30"

      - name: Find and Replace
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "Last updated: .*"
          replace: "Last updated: ${{ steps.current-time.outputs.formattedTime }}"
          regex: true
          include: README.md

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "BOT: Auto-update last modified time"
